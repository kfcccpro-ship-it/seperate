<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>자산건전성 기준 참조 — 새마을금고</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400&display=swap');
:root{
  --blue:#3b5bdb;--blue-light:#ebf0ff;
  --green:#087f5b;--green-light:#e6faf4;
  --amber:#b45309;--amber-light:#fffbeb;
  --orange:#c2410c;--orange-light:#fff7ed;
  --red:#b91c1c;--red-light:#fef2f2;
  --purple:#6d28d9;--purple-light:#f5f3ff;
  --gray:#6b7280;--gray-light:#f3f4f6;--gray-mid:#e5e7eb;
  --dark:#1e2333;--white:#fff;
  --r:12px;--r-sm:8px;
  --font:'Noto Sans KR',-apple-system,sans-serif;
  --mono:'JetBrains Mono',monospace;

  /* 등급 색상 */
  --c-n:#2e7d32;--bg-n:#e8f5e9;--bd-n:#a5d6a7;
  --c-w:#f57f17;--bg-w:#fff8e1;--bd-w:#ffe082;
  --c-f:#e64a19;--bg-f:#fff3e0;--bd-f:#ffcc80;
  --c-d:#c62828;--bg-d:#fce4ec;--bd-d:#f48fb1;
  --c-l:#6d28d9;--bg-l:#ede7f6;--bd-l:#ce93d8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:#f0f2f8;min-height:100vh;color:var(--dark)}

/* ── APP SHELL ── */
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--white);display:flex;flex-direction:column}

/* ── TOPBAR ── */
.topbar{background:var(--dark);padding:13px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.tlogo{width:30px;height:30px;background:rgba(255,255,255,.12);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ttitle{font-size:14px;font-weight:700;color:#fff;flex:1}
.tsub{font-size:10px;color:rgba(255,255,255,.55);margin-top:1px}
.tver{font-size:10px;background:rgba(255,255,255,.15);color:#fff;padding:2px 7px;border-radius:20px;font-weight:700;flex-shrink:0}

/* ── NAV TABS (자산 유형) ── */
.nav-tabs{display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--gray-mid);background:var(--white);position:sticky;top:56px;z-index:90;padding:0 2px}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:10px 14px;font-size:13px;font-weight:500;color:var(--gray);border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer;flex-shrink:0;transition:all .15s}
.nav-tab.active{color:var(--dark);border-bottom-color:var(--dark);font-weight:700}
.nav-tab:hover{color:var(--dark)}

/* ── SEARCH ── */
.search-wrap{padding:12px 14px;background:var(--white);border-bottom:1px solid var(--gray-mid);position:sticky;top:103px;z-index:89}
.search-box{display:flex;align-items:center;gap:9px;background:var(--gray-light);border-radius:var(--r-sm);padding:9px 13px}
.search-icon{font-size:15px;flex-shrink:0;opacity:.5}
.search-input{flex:1;border:none;background:none;font-size:14px;font-family:var(--font);color:var(--dark);outline:none}
.search-input::placeholder{color:#9ca3af}
.search-clear{border:none;background:none;font-size:16px;cursor:pointer;color:var(--gray);padding:0;line-height:1;display:none}
.search-clear.v{display:block}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px}

/* ── 등급 배지 ── */
.grade-strip{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.gs-btn{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.gs-n{background:var(--bg-n);color:var(--c-n);border-color:var(--bd-n)}
.gs-w{background:var(--bg-w);color:var(--c-w);border-color:var(--bd-w)}
.gs-f{background:var(--bg-f);color:var(--c-f);border-color:var(--bd-f)}
.gs-d{background:var(--bg-d);color:var(--c-d);border-color:var(--bd-d)}
.gs-l{background:var(--bg-l);color:var(--c-l);border-color:var(--bd-l)}
.gs-btn.dimmed{opacity:.35}

/* ── REG INFO ── */
.reg-bar{display:flex;align-items:center;gap:7px;background:var(--gray-light);border-radius:var(--r-sm);padding:8px 12px;margin-bottom:14px;font-size:11px;color:var(--gray)}
.reg-bar strong{color:var(--dark)}

/* ── GRADE SECTION ── */
.grade-section{margin-bottom:10px;border-radius:var(--r);overflow:hidden;border:1px solid var(--gray-mid)}
.grade-header{padding:12px 15px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.grade-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.grade-title{font-size:15px;font-weight:700;flex:1}
.grade-en{font-size:11px;opacity:.6;font-weight:400;margin-left:4px}
.grade-count{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.grade-toggle{font-size:13px;color:var(--gray);transition:transform .2s;margin-left:4px}
.grade-toggle.o{transform:rotate(180deg)}
.grade-body{display:none;border-top:1px solid var(--gray-mid)}
.grade-body.o{display:block}

/* 등급별 헤더 색상 */
.gs-header-n{background:var(--bg-n)}.gs-header-n .grade-title{color:var(--c-n)}.gs-header-n .grade-count{background:var(--c-n);color:#fff}.gs-header-n .grade-dot{background:var(--c-n)}
.gs-header-w{background:var(--bg-w)}.gs-header-w .grade-title{color:var(--c-w)}.gs-header-w .grade-count{background:var(--c-w);color:#fff}.gs-header-w .grade-dot{background:var(--c-w)}
.gs-header-f{background:var(--bg-f)}.gs-header-f .grade-title{color:var(--c-f)}.gs-header-f .grade-count{background:var(--c-f);color:#fff}.gs-header-f .grade-dot{background:var(--c-f)}
.gs-header-d{background:var(--bg-d)}.gs-header-d .grade-title{color:var(--c-d)}.gs-header-d .grade-count{background:var(--c-d);color:#fff}.gs-header-d .grade-dot{background:var(--c-d)}
.gs-header-l{background:var(--bg-l)}.gs-header-l .grade-title{color:var(--c-l)}.gs-header-l .grade-count{background:var(--c-l);color:#fff}.gs-header-l .grade-dot{background:var(--c-l)}

/* ── 기준 아이템 ── */
.criteria-item{padding:12px 15px;border-bottom:1px solid var(--gray-light);display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:background .12s}
.criteria-item:last-child{border-bottom:none}
.criteria-item:hover{background:var(--gray-light)}
.criteria-item.active-item{background:var(--blue-light)}
.ci-num{font-size:11px;font-weight:700;color:var(--gray);font-family:var(--mono);min-width:24px;margin-top:2px;flex-shrink:0}
.ci-body{flex:1}
.ci-main{font-size:13px;font-weight:500;color:var(--dark);line-height:1.55;margin-bottom:3px}
.ci-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.ci-tag{font-size:10px;padding:1px 7px;border-radius:20px;border:1px solid var(--gray-mid);color:var(--gray)}
.ci-tag.key{background:var(--blue-light);border-color:#b0c4f8;color:var(--blue)}
.ci-expand{font-size:14px;color:var(--gray);flex-shrink:0;margin-top:2px;transition:transform .2s}
.ci-expand.o{transform:rotate(180deg)}
.ci-detail{display:none;padding:10px 15px 13px 49px;background:#f9fafb;border-top:1px solid var(--gray-light)}
.ci-detail.o{display:block}
.ci-basis{font-size:11px;font-weight:700;color:var(--blue);margin-bottom:5px;letter-spacing:.03em}
.ci-text{font-size:12px;color:#374151;line-height:1.7}
.ci-exceptions{margin-top:8px}
.ci-exc-title{font-size:11px;font-weight:700;color:var(--amber);margin-bottom:4px}
.ci-exc-item{font-size:12px;color:#374151;padding:3px 0;line-height:1.5;display:flex;gap:6px}
.ci-exc-dot{color:var(--amber);flex-shrink:0}
.ci-caution{margin-top:8px;background:#fff8e1;border-radius:6px;padding:8px 10px;font-size:12px;color:#92400e;line-height:1.6}

/* ── 검색 결과 ── */
.search-result-section{margin-bottom:6px}
.search-result-header{font-size:11px;font-weight:700;color:var(--gray);padding:6px 4px;text-transform:uppercase;letter-spacing:.05em}
.no-result{text-align:center;padding:40px 20px;color:var(--gray)}
.no-result-icon{font-size:36px;margin-bottom:10px}
.no-result-text{font-size:14px}

/* ── 하이라이트 ── */
mark{background:#fef08a;color:#713f12;border-radius:3px;padding:0 2px}

/* ── 요약 카드 (홈탭) ── */
.summary-overview{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.ov-card{border-radius:var(--r-sm);padding:12px;cursor:pointer;transition:all .15s}
.ov-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.ov-card.n{background:var(--bg-n);border:1px solid var(--bd-n)}
.ov-card.w{background:var(--bg-w);border:1px solid var(--bd-w)}
.ov-card.f{background:var(--bg-f);border:1px solid var(--bd-f)}
.ov-card.d{background:var(--bg-d);border:1px solid var(--bd-d)}
.ov-card.l{background:var(--bg-l);border:1px solid var(--bd-l);grid-column:1/-1}
.ov-grade{font-size:16px;font-weight:700;margin-bottom:3px}
.ov-card.n .ov-grade{color:var(--c-n)}.ov-card.w .ov-grade{color:var(--c-w)}.ov-card.f .ov-grade{color:var(--c-f)}.ov-card.d .ov-grade{color:var(--c-d)}.ov-card.l .ov-grade{color:var(--c-l)}
.ov-key{font-size:11px;color:var(--gray);line-height:1.5}
.ov-period{font-size:12px;font-weight:700;margin-top:4px;font-family:var(--mono)}
.ov-card.n .ov-period{color:var(--c-n)}.ov-card.w .ov-period{color:var(--c-w)}.ov-card.f .ov-period{color:var(--c-f)}.ov-card.d .ov-period{color:var(--c-d)}.ov-card.l .ov-period{color:var(--c-l)}

/* ── 충당금 참조표 ── */
.rate-table-wrap{border:1px solid var(--gray-mid);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.rate-table-head{background:var(--dark);color:#fff;padding:10px 14px;font-size:12px;font-weight:700}
.rate-table{width:100%;border-collapse:collapse;font-size:13px}
.rate-table th{background:var(--gray-light);padding:8px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--gray);border-bottom:1px solid var(--gray-mid)}
.rate-table td{padding:9px 12px;border-bottom:1px solid var(--gray-light);color:var(--dark);vertical-align:middle}
.rate-table tr:last-child td{border-bottom:none}
.rate-num{font-family:var(--mono);font-weight:700;text-align:right}

/* ── FLOW 다이어그램 (연체기간 흐름도) ── */
.flow-wrap{border:1px solid var(--gray-mid);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.flow-head{background:var(--dark);color:#fff;padding:10px 14px;font-size:12px;font-weight:700}
.flow-body{padding:14px}
.flow-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.flow-row:last-child{margin-bottom:0}
.flow-period{font-size:11px;font-family:var(--mono);font-weight:700;color:var(--dark);min-width:90px;flex-shrink:0}
.flow-arrow{font-size:12px;color:var(--gray);flex-shrink:0}
.flow-badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;flex-shrink:0}
.fb-n{background:var(--bg-n);color:var(--c-n)}.fb-w{background:var(--bg-w);color:var(--c-w)}
.fb-f{background:var(--bg-f);color:var(--c-f)}.fb-d{background:var(--bg-d);color:var(--c-d)}.fb-l{background:var(--bg-l);color:var(--c-l)}
.flow-note{font-size:11px;color:var(--gray);flex:1;line-height:1.4}

/* ── BUTTONS ── */
.safe-bottom{height:env(safe-area-inset-bottom,16px)}

@media(min-width:768px){
  body{display:flex;align-items:flex-start;justify-content:center;padding:24px}
  .app{max-width:480px;min-height:calc(100vh - 48px);border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.12)}
}
</style>
</head>
<body>
<div class="app">

<!-- TOPBAR -->
<div class="topbar">
  <div class="tlogo">📚</div>
  <div style="flex:1">
    <div class="ttitle">자산건전성 기준 참조</div>
    <div class="tsub" id="topRegRef">새마을금고 감독기준 [별표 2]</div>
  </div>
  <span class="tver">B안</span>
</div>

<!-- NAV TABS -->
<div class="nav-tabs" id="navTabs">
  <div class="nav-tab active" onclick="switchTab('home',this)">🏠 홈</div>
  <div class="nav-tab" onclick="switchTab('loan',this)">💰 대출금</div>
  <div class="nav-tab" onclick="switchTab('securities',this)">📈 유가증권</div>
  <div class="nav-tab" onclick="switchTab('provisional',this)">📋 가지급금</div>
  <div class="nav-tab" onclick="switchTab('receivable',this)">🧾 미수금</div>
  <div class="nav-tab" onclick="switchTab('interest',this)">🏷️ 미수이자</div>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" placeholder="검색: 연체 기간, 담보, 부도, 폐업…" oninput="onSearch(this.value)">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
</div>

<div class="content" id="mainContent">
  <!-- 동적으로 렌더링 -->
</div>

</div><!-- /app -->

<script>
// ═══════════════════════════════════════════════════════════════
//  지식 데이터 — 여기를 수정하면 모든 화면에 반영됩니다
// ═══════════════════════════════════════════════════════════════
const META = {
  regRef: '행정안전부고시 제2025-48호',
  regDate: '2025. 7. 8. 시행',
};

// 충당금 적립률
const RATES = [
  { grade:'정상',   cls:'n', rate:0.5,  note:'기본 적립' },
  { grade:'요주의', cls:'w', rate:2.0,  note:'기본 적립' },
  { grade:'고정',   cls:'f', rate:20.0, note:'회수예상가액 해당분' },
  { grade:'회수의문',cls:'d', rate:50.0, note:'회수예상가액 초과분' },
  { grade:'추정손실',cls:'l', rate:100.0,note:'회수불능 확실분' },
];

// 담보별 회수예상가액 반영비율
const COLLATERAL_RATES = [
  { type:'예탁금·적금', rate:100 },
  { type:'국공채·지방채 등', rate:95 },
  { type:'부동산 (감정가)', rate:70 },
  { type:'동산 (감정가)', rate:50 },
  { type:'보증서 (신보·농신보 등)', rate:100 },
  { type:'무담보', rate:0 },
];

// ══════════════════════════════════════════════════════
//  핵심 분류 기준 데이터
//  각 항목 구조: { id, grade, gradeClass, main, basis, detail, tags, exceptions, caution }
//  grade: 정상|요주의|고정|회수의문|추정손실
//  gradeClass: n|w|f|d|l
// ══════════════════════════════════════════════════════
const CRITERIA = {

  // ── 대출금 ──────────────────────────────────────────
  loan: [
    // 정상
    { id:'L-N-01', grade:'정상', gc:'n', main:'연체 없고 신용상태 양호한 채무자의 총대출금', basis:'별표2 Ⅰ-1 정상', detail:'금융거래 내용과 신용상태가 양호하고 채무상환능력이 충분한 채무자에 대한 대출. 연체가 없거나 1개월 미만이라도 상환능력 충분 시 포함.', tags:['연체없음','정상거래'], caution:'' },
    { id:'L-N-02', grade:'정상', gc:'n', main:'1개월 미만 연체이나 채무상환능력 충분', basis:'별표2 Ⅰ-1 정상', detail:'1개월 미만의 연체대출금을 보유하고 있으나 채무상환능력이 충분한 채무자에 대한 총대출금.', tags:['1개월미만','연체'], caution:'1개월 도달 즉시 재분류 필요' },
    { id:'L-N-03', grade:'정상', gc:'n', main:'고정이하 보유 채무자 — 국채·지방채·재정증권·한은통화안정증권 담보분', basis:'별표2 Ⅰ-2 ④ 단서 제1~3호', detail:'고정이하 분류 대출 보유 채무자라도 국채(국채법), 지방채(지방재정법), 재정증권(국고금관리법), 한국은행통화안정증권(한국은행법) 담보 해당 금액은 정상 분류 가능.', tags:['담보','국채','지방채','담보분'], caution:'' },
    { id:'L-N-04', grade:'정상', gc:'n', main:'고정이하 보유 채무자 — 공기업·준정부기관 채권 또는 공제해지환급금·금융기관보증 담보분', basis:'별표2 Ⅰ-2 ④ 단서 제4~6호', detail:'공기업·준정부기관 발행 채권, 공제해지환급금, 신보·농신보·보증보험·건설공제조합·주택도시보증공사·지역신용보증재단 등 보증 담보분은 정상 분류 가능.', tags:['담보','보증서','공제'], caution:'보증 유효기간 및 한도 확인 필수' },

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let currentTab='home';
let activeGrades=new Set(['정상','요주의','고정','회수의문','추정손실']);
let searchQuery='';
let openItems=new Set();

// ═══════════════════════════════════════════════════════════════
//  NAV
// ═══════════════════════════════════════════════════════════════
function switchTab(tab, el){
  currentTab=tab;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  clearSearch(false);
  render();
}

// ═══════════════════════════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════════════════════════
function onSearch(q){
  searchQuery=q.trim();
  document.getElementById('searchClear').classList.toggle('v',q.length>0);
  render();
}
function clearSearch(doRender=true){
  searchQuery='';
  document.getElementById('searchInput').value='';
  document.getElementById('searchClear').classList.remove('v');
  if(doRender)render();
}

// ═══════════════════════════════════════════════════════════════
//  GRADE FILTER
// ═══════════════════════════════════════════════════════════════
function toggleGrade(grade, btn){
  if(activeGrades.has(grade)){
    if(activeGrades.size===1)return;
    activeGrades.delete(grade);btn.classList.add('dimmed');
  } else {
    activeGrades.add(grade);btn.classList.remove('dimmed');
  }
  render();
}

// ═══════════════════════════════════════════════════════════════
//  ITEM EXPAND/COLLAPSE
// ═══════════════════════════════════════════════════════════════
function toggleItem(id){
  if(openItems.has(id))openItems.delete(id);
  else openItems.add(id);
  const body=document.getElementById('body_'+id);
  const icon=document.getElementById('ico_'+id);
  if(body){body.classList.toggle('o');icon.classList.toggle('o');}
}

// ═══════════════════════════════════════════════════════════════
//  HIGHLIGHT
// ═══════════════════════════════════════════════════════════════
function hl(text,q){
  if(!q)return text;
  const re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  return text.replace(re,m=>`<mark>${m}</mark>`);
}

function matchItem(item, q){
  if(!q)return true;
  const haystack=[item.main,item.detail,item.basis,...(item.tags||[]),...(item.exceptions||[]),item.caution||''].join(' ').toLowerCase();
  return haystack.includes(q.toLowerCase());
}

// ═══════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════
function render(){
  const cont=document.getElementById('mainContent');
  if(searchQuery){renderSearch(cont);return;}
  if(currentTab==='home'){renderHome(cont);return;}
  renderTab(cont, CRITERIA[currentTab]||[]);
}

  switchTab(tab, tabEl||document.querySelectorAll('.nav-tab')[1]);
  activeGrades=new Set([grade]);
  document.querySelectorAll('.gs-btn').forEach(btn=>{
    const g=btn.dataset.grade;
    btn.classList.toggle('dimmed',g!==grade);
  });
  render();
}

// ── 자산 유형 탭 ──
function renderTab(cont, items){
  const grades=['정상','요주의','고정','회수의문','추정손실'];
  const gcMap={정상:'n',요주의:'w',고정:'f',회수의문:'d',추정손실:'l'};

  let html=`
    <div class="grade-strip" id="gradeStrip">
      ${grades.map(g=>`<button class="gs-btn gs-${gcMap[g]}${activeGrades.has(g)?'':' dimmed'}" data-grade="${g}" onclick="toggleGrade('${g}',this)">${g}</button>`).join('')}
    </div>`;

  grades.forEach(grade=>{
    if(!activeGrades.has(grade))return;
    const gradeItems=items.filter(i=>i.grade===grade);
    if(!gradeItems.length)return;
    const gc=gcMap[grade];
    html+=`
      <div class="grade-section" id="gs_${grade}">
        <div class="grade-header gs-header-${gc}" onclick="toggleGradeSection('${grade}')">
          <div class="grade-dot"></div>
          <div class="grade-title">${grade}<span class="grade-en">${{정상:'Normal',요주의:'Precautionary',고정:'Substandard',회수의문:'Doubtful',추정손실:'Est. Loss'}[grade]}</span></div>
          <span class="grade-count">${gradeItems.length}개</span>
          <span class="grade-toggle o" id="gst_${grade}">▼</span>
        </div>
        <div class="grade-body o" id="gsb_${grade}">
          ${gradeItems.map(item=>renderItem(item,'')).join('')}
        </div>
      </div>`;
  });

  html+=`<div class="safe-bottom"></div>`;
  cont.innerHTML=html;
}

function toggleGradeSection(grade){
  const body=document.getElementById('gsb_'+grade);
  const icon=document.getElementById('gst_'+grade);
  body.classList.toggle('o');icon.classList.toggle('o');
}

// ── 검색 결과 ──
function renderSearch(cont){
  const allItems=Object.values(CRITERIA).flat();
  const matched=allItems.filter(i=>matchItem(i,searchQuery));
  if(!matched.length){
    cont.innerHTML=`<div class="no-result"><div class="no-result-icon">🔍</div><div class="no-result-text">「${searchQuery}」에 해당하는 기준이 없습니다.</div><div style="font-size:13px;color:var(--gray);margin-top:6px">다른 검색어를 입력해 보세요.</div></div>`;
    return;
  }
  const ASSET_NAMES={loan:'대출금',securities:'유가증권',provisional:'가지급금',receivable:'미수금',interest:'미수이자'};
  let html=`<div style="font-size:13px;font-weight:500;color:var(--gray);margin-bottom:12px">「${searchQuery}」 검색 결과 ${matched.length}건</div>`;
  Object.keys(CRITERIA).forEach(assetKey=>{
    const assetMatched=CRITERIA[assetKey].filter(i=>matchItem(i,searchQuery));
    if(!assetMatched.length)return;
    html+=`<div class="search-result-section"><div class="search-result-header">${ASSET_NAMES[assetKey]}</div>${assetMatched.map(item=>renderItem(item,searchQuery)).join('')}</div>`;
  });
  html+=`<div class="safe-bottom"></div>`;
  cont.innerHTML=html;
}

// ── 아이템 렌더링 ──
function renderItem(item, q){
  const isOpen=openItems.has(item.id);
  const gcMap={n:['#2e7d32','#e8f5e9'],w:['#f57f17','#fff8e1'],f:['#e64a19','#fff3e0'],d:['#c62828','#fce4ec'],l:['#6d28d9','#ede7f6']};
  const [color,bg]=gcMap[item.gc]||['#6b7280','#f3f4f6'];
  return `
    <div class="criteria-item${isOpen?' active-item':''}" onclick="toggleItem('${item.id}')">
      <span class="ci-num" style="color:${color}">${item.id.split('-').slice(0,2).join('-')}</span>
      <div class="ci-body">
        <div class="ci-main">${hl(item.main,q)}</div>
        <div class="ci-tags">
          <span class="ci-tag" style="background:${bg};color:${color};border-color:${color}40">${item.grade}</span>
          ${(item.tags||[]).map(t=>`<span class="ci-tag${q&&t.toLowerCase().includes(q.toLowerCase())?' key':''}">${hl(t,q)}</span>`).join('')}
        </div>
      </div>
      <span class="ci-expand${isOpen?' o':''}" id="ico_${item.id}">▼</span>
    </div>
    <div class="ci-detail${isOpen?' o':''}" id="body_${item.id}">
      <div class="ci-basis">${item.basis}</div>
      <div class="ci-text">${hl(item.detail,q)}</div>
      ${item.exceptions&&item.exceptions.length?`
        <div class="ci-exceptions">
          <div class="ci-exc-title">⚡ 예외 / 상향 분류 가능</div>
          ${item.exceptions.map(e=>`<div class="ci-exc-item"><span class="ci-exc-dot">→</span><span>${hl(e,q)}</span></div>`).join('')}
        </div>`:''}
      ${item.caution?`<div class="ci-caution">💡 <strong>주의:</strong> ${hl(item.caution,q)}</div>`:''}
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
document.getElementById('topRegRef').textContent=`${META.regRef} [별표 2]`;
render();
</script>
